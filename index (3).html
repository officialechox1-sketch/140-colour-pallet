<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML/CSS Color Reference</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    
    body {
      background: #f5f5f5;
      padding: 30px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 40px;
    }
    
    p {
      text-align: center;
      margin-bottom: 30px;
      color: #555;
    }
    
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
      transition: .3s;
    }
    
    .card:hover {
      transform: translateY(-6px);
    }
    
    .color {
      height: 120px;
      width: 100%;
    }
    
    .info {
      padding: 15px;
    }
    
    .info h3 {
      margin-bottom: 8px;
      font-size: 20px;
    }
    
    .info p {
      margin: 0;
      text-align: left;
      font-weight: bold;
    }
  </style>
</head>
